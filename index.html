<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <main class="app-shell">
      <section class="container py-4 py-md-5">
        <div class="app-header mb-4">
          <div>
            <p class="eyebrow mb-1">Personal Finance</p>
            <h1 class="mb-1">Smart Expense Tracker</h1>
            <p class="text-muted mb-0">Track income, expenses, and balance with local browser storage.</p>
          </div>
        </div>

        <section class="dashboard-grid mb-4" id="dashboard" aria-label="Expense dashboard"></section>

        <div class="row g-4 align-items-start">
          <section class="col-lg-5">
            <div class="form-panel">
              <div class="section-heading">
                <h2 id="formTitle">Add Transaction</h2>
              </div>

              <div id="errorContainer"></div>

              <form id="transactionForm" novalidate>
                <div class="row g-3">
                  <div class="col-sm-6">
                    <label for="type" class="form-label">Type</label>
                    <select id="type" class="form-select" required>
                      <option value="income">Income</option>
                      <option value="expense">Expense</option>
                    </select>
                  </div>

                  <div class="col-sm-6">
                    <label for="category" class="form-label">Category</label>
                    <select id="category" class="form-select">
                      <option value="Optional">Optional</option>
                      <option value="Salary">Salary</option>
                      <option value="Food">Food</option>
                      <option value="Travel">Travel</option>
                      <option value="Shopping">Shopping</option>
                      <option value="Bills">Bills</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>

                  <div class="col-sm-6">
                    <label for="amount" class="form-label">Amount</label>
                    <input id="amount" class="form-control" type="number" min="0" step="0.01" placeholder="2500" required />
                  </div>

                  <div class="col-sm-6">
                    <label for="date" class="form-label">Date</label>
                    <input id="date" class="form-control" type="date" required />
                  </div>

                  <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <input id="description" class="form-control" type="text" maxlength="80" placeholder="Salary, groceries, rent..." required />
                  </div>
                </div>

                <div class="form-actions mt-4">
                  <button id="submitButton" class="btn btn-primary" type="submit">
                    <i class="bi bi-plus-circle"></i>
                    <span>Add Transaction</span>
                  </button>
                  <button id="cancelEditButton" class="btn btn-outline-secondary d-none" type="button">
                    <i class="bi bi-x-circle"></i>
                    <span>Cancel Edit</span>
                  </button>
                </div>
              </form>
            </div>
          </section>

          <section class="col-lg-7">
            <div class="history-panel">
              <div class="history-top">
                <div class="section-heading">
                  <h2>Transaction History</h2>
                </div>

                <div class="history-controls">
                  <div class="search-wrap">
                    <i class="bi bi-search"></i>
                    <input id="searchInput" class="form-control" type="search" placeholder="Search description" />
                  </div>

                  <select id="filterSelect" class="form-select" aria-label="Filter transactions">
                    <option value="all">All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                  </select>
                </div>
              </div>

              <div class="history-labels" aria-hidden="true">
                <span>Date</span>
                <span>Description</span>
                <span>Amount</span>
                <span>Actions</span>
              </div>
              <div id="transactionList" class="transaction-list"></div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer>
    </script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
